project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - about.qmd
    - services.qmd
    - contact.qmd

website:
  title: "Divyas Mystic Sanctuary"
  description: "Tarot guidance, Reiki healing and crystal ball readings."
  site-url: "https://YOUR-SITE.netlify.app"
  navbar:
    background: transparent
    foreground: "#fffaf1"
    pinned: true
    logo: images/logo-mark.png
    logo-alt: "Divyas Mystic Sanctuary"
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: services.qmd
        text: Services
      - href: contact.qmd
        text: Contact
    right:
      - text: "Book a session"
        href: contact.qmd#book
        aria-label: "Book a session"
  page-footer:
    left: "© 2026 Divyas Mystic Sanctuary"
    center: "Guidance for reflection and wellbeing."
    right:
      - icon: instagram
        href: "https://instagram.com/"
        aria-label: Instagram
      - icon: facebook
        href: "https://www.facebook.com/people/Divyas-Mystic-Sanctuary/61591948555685/"
        aria-label: Facebook
      - icon: whatsapp
        href: "https://wa.me/919620308564"
        aria-label: WhatsApp

format:
  html:
    theme: cosmo
    toc: false
    smooth-scroll: true
    page-layout: full
    css:
      - css/base.css
      - css/navigation.css
      - css/brand.css
      - css/hero.css
      - css/cards.css
      - css/portraits.css
      - css/animations.css
      - css/responsive.css
    include-in-header: assets/head.html
    include-after-body: assets/scripts.html

execute:
  freeze: auto
